<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Fan Rescue — Internal Proposal Portal</title>

<!-- Brand from central asset host -->
<link rel="icon" type="image/svg+xml" href="https://assets.fanrescue.co.uk/favicon/favicon.svg">
<link rel="icon" type="image/x-icon" href="https://assets.fanrescue.co.uk/favicon/favicon.ico">
<link rel="apple-touch-icon" href="https://assets.fanrescue.co.uk/favicon/apple-touch-icon.png">
<link rel="stylesheet" href="https://assets.fanrescue.co.uk/brand/tokens.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--fr-font-body);
  background: var(--fr-navy-deep);
  color: var(--fr-warm-white);
  line-height: 1.55;
  font-size: 15px;
  min-height: 100vh;
}
a { color: var(--fr-gold); text-decoration: none; }
a:hover { color: var(--fr-gold-light); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ════ TOPBAR ════ */
.topbar {
  background: var(--fr-navy-deep);
  border-bottom: 2px solid var(--fr-gold);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar__brand { display: flex; align-items: center; gap: 16px; }
.topbar__logo { height: 32px; display: block; }
.topbar__label {
  font-size: 11px;
  color: var(--fr-gold-pale);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
}
.topbar__user { font-size: 12px; color: rgba(245, 242, 236, 0.55); }

/* ════ MAIN ════ */
main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
.heading {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 32px;
  gap: 24px;
  flex-wrap: wrap;
}
.heading h1 {
  font-family: var(--fr-font-display);
  font-size: 30px;
  color: var(--fr-gold);
  letter-spacing: 0.03em;
}
.heading p {
  color: rgba(245, 242, 236, 0.6);
  font-size: 13px;
  margin-top: 6px;
}
.heading__total {
  font-size: 12px;
  color: rgba(245, 242, 236, 0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.heading__total strong {
  color: var(--fr-gold);
  font-family: var(--fr-font-display);
  font-size: 18px;
  letter-spacing: 0.02em;
  margin-left: 6px;
}

/* ════ SEARCH ════ */
.search { position: relative; margin-bottom: 24px; }
.search input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1px solid rgba(245, 242, 236, 0.15);
  border-radius: var(--fr-radius-md);
  font-family: var(--fr-font-body);
  font-size: 14px;
  background: rgba(245, 242, 236, 0.05);
  color: var(--fr-warm-white);
  transition: border-color 0.15s, background 0.15s;
}
.search input:focus {
  outline: none;
  border-color: var(--fr-gold);
  background: rgba(245, 242, 236, 0.08);
}
.search input::placeholder { color: rgba(245, 242, 236, 0.4); }
.search svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: rgba(245, 242, 236, 0.4);
}

/* ════ TABS ════ */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid rgba(245, 242, 236, 0.1);
  margin-bottom: 0;
  flex-wrap: wrap;
}
.tab {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(245, 242, 236, 0.5);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--fr-warm-white); }
.tab--active {
  color: var(--fr-gold);
  border-bottom-color: var(--fr-gold);
}
.tab__count {
  display: inline-block;
  background: rgba(245, 242, 236, 0.08);
  color: rgba(245, 242, 236, 0.6);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  margin-left: 8px;
  font-weight: 700;
}
.tab--active .tab__count {
  background: var(--fr-gold);
  color: var(--fr-navy-deep);
}

/* ════ LIST ════ */
/* Rows stay light for readability. They sit as "cards" on the navy page. */
.panel {
  background: var(--fr-warm-white);
  border: 1px solid rgba(245, 242, 236, 0.1);
  border-top: none;
  border-radius: 0 0 var(--fr-radius-md) var(--fr-radius-md);
  overflow: hidden;
}
.panel--hidden { display: none; }
.row {
  display: grid;
  grid-template-columns: 90px 1fr 130px 100px;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--fr-border);
  transition: background 0.12s;
  cursor: pointer;
  gap: 16px;
}
.row:hover { background: #faf7ef; }
.row:last-child { border-bottom: none; }
.row__ref {
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 13px;
  color: var(--fr-gold);
  font-weight: 600;
}
.row__client {
  font-size: 15px;
  font-weight: 600;
  color: var(--fr-navy-deep);
}
.row__filename {
  font-size: 11px;
  color: var(--fr-warm-grey);
  font-family: ui-monospace, monospace;
  margin-top: 2px;
  word-break: break-all;
}
.row__type {
  font-size: 11px;
  color: var(--fr-warm-grey);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.row__action { text-align: right; }
.row__open {
  color: var(--fr-gold);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.15s;
}
.row:hover .row__open { opacity: 1; }

.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--fr-warm-grey);
  font-size: 14px;
}
.empty strong {
  display: block;
  font-family: var(--fr-font-display);
  font-size: 16px;
  color: var(--fr-navy-deep);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}

/* ════ LOADING ════ */
.loading { padding: 80px 24px; text-align: center; }
.loading__spinner {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 3px solid var(--fr-border);
  border-top-color: var(--fr-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading p { margin-top: 14px; font-size: 13px; color: var(--fr-warm-grey); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ════ ERROR ════ */
.error {
  background: rgba(198, 69, 69, 0.1);
  border: 1px solid rgba(198, 69, 69, 0.3);
  border-left: 4px solid #d97373;
  border-radius: var(--fr-radius-md);
  padding: 20px 24px;
  margin-top: 16px;
}
.error strong {
  display: block;
  color: #f0a8a8;
  font-family: var(--fr-font-display);
  font-size: 14px;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.error p {
  font-size: 13px;
  color: rgba(245, 242, 236, 0.7);
  margin: 0;
}
.error code {
  background: rgba(0, 0, 0, 0.3);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 12px;
  color: var(--fr-gold-pale);
}

/* ════ FOOTER ════ */
footer {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
  font-size: 11px;
  color: rgba(245, 242, 236, 0.3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@media (max-width: 700px) {
  .row { grid-template-columns: 70px 1fr auto; gap: 12px; padding: 14px 16px; }
  .row__type { display: none; }
  main { padding: 24px 12px 60px; }
  .topbar { padding: 12px 16px; }
  .heading h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar__brand">
    <img class="topbar__logo" src="https://assets.fanrescue.co.uk/logos/FR-Horizontal-Transparent.svg" alt="Fan Rescue">
    <span class="topbar__label">Internal Portal</span>
  </div>
  <div class="topbar__user" id="user-email">…</div>
</div>

<main>
  <div class="heading">
    <div>
      <h1>Proposal Portal</h1>
      <p>All live proposals and quotes across every category. Click any row to open in a new tab.</p>
    </div>
    <div class="heading__total">Total live <strong id="total-count">—</strong></div>
  </div>

  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="search" placeholder="Search by client name, reference, or filename…" autocomplete="off">
  </div>

  <div class="tabs" id="tabs">
    <!-- Tabs are inserted dynamically based on which categories have proposals -->
  </div>

  <div id="panels">
    <div class="panel">
      <div class="loading">
        <div class="loading__spinner"></div>
        <p>Loading proposals from GitHub…</p>
      </div>
    </div>
  </div>
</main>

<footer>
  Fan Rescue Ltd · Internal use only · Updated live from GitHub
</footer>

<script>
// ════════════════════════════════════════════════════════
// FAN RESCUE PORTAL — Data Layer
//
// The portal reads ONE file: proposals.json (in this repo).
// That file is the source of truth for what proposals exist
// and which category each one belongs to.
//
// Adding a new proposal:
//   1. Push the HTML quote to proposals.fanrescue.co.uk or
//      quotes.fanrescue.co.uk as normal.
//   2. Add a new entry to proposals.json (one line). Push.
//   3. Refresh the portal — done.
//
// Adding a renewal:
//   1. Generate the renewal HTML in the proposals.fanrescue.co.uk repo
//      (same hosting as a standard proposal).
//   2. Add an entry to proposals.json with "category": "renewals".
//   3. It will appear in the Renewals tab only (not Cleaning).
// ════════════════════════════════════════════════════════

// ─── Categories ─────────────────────────────────────────
// The id values must match the "category" values in proposals.json.
const CATEGORIES = [
  { id: 'cleaning',        label: 'Cleaning' },
  { id: 'renewals',        label: 'Renewals' },
  { id: 'installation',    label: 'Installations' },
  { id: 'fan-services',    label: 'Fan Services' },
  { id: 'me-design',       label: 'M&E Design' },
  { id: 'odour-risk',      label: 'Odour Risk Assessment' },
  { id: 'mixed',           label: 'Mixed' },
  { id: 'uncategorised',   label: 'Uncategorised' }
];

// ─── Hosts ──────────────────────────────────────────────
// Map shorthand "host" values in proposals.json to full URLs.
const HOSTS = {
  proposals: 'https://proposals.fanrescue.co.uk',
  quotes:    'https://quotes.fanrescue.co.uk'
};

// ─── Load the proposal list ─────────────────────────────
async function loadProposals() {
  // Cache-bust so updates to proposals.json show up fast
  const r = await fetch('proposals.json?t=' + Date.now());
  if (!r.ok) throw new Error(`Failed to load proposals.json (HTTP ${r.status})`);
  const data = await r.json();
  return data.proposals || [];
}

// ─── Build a full quote URL from a record ───────────────
function buildUrl(rec) {
  const host = HOSTS[rec.host] || rec.host;
  return `${host}/${rec.filename}`;
}

// ─── Sort key (newest first) ────────────────────────────
// FR-NNNN          → 2026 era, key = 20260000 + NNNN
// FR-YYYY-NNN      → year explicit, key = YYYY * 1000 + NNN
function refSortKey(ref) {
  const legacy = ref.match(/^FR-(\d{4})-(\d{3})$/);
  if (legacy) return parseInt(legacy[1], 10) * 1000 + parseInt(legacy[2], 10);
  const modern = ref.match(/^FR-(\d{4})$/);
  if (modern) return 2026 * 1000 + parseInt(modern[1], 10);
  return 0;
}

// ════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════

const TAB_ORDER = ['cleaning', 'renewals', 'installation', 'fan-services', 'me-design', 'odour-risk', 'mixed', 'uncategorised'];

function groupByCategory(records) {
  const out = {};
  CATEGORIES.forEach(c => out[c.id] = []);
  records.forEach(r => {
    const id = (r.category && out[r.category]) ? r.category : 'uncategorised';
    out[id].push(r);
  });
  return out;
}

function renderPanel(panelEl, records) {
  if (records.length === 0) {
    panelEl.innerHTML = `<div class="empty"><strong>Nothing here yet</strong>Add proposals to proposals.json to populate this tab.</div>`;
    return;
  }
  panelEl.innerHTML = records.map(r => {
    const url       = buildUrl(r);
    const searchKey = (r.client + ' ' + r.ref + ' ' + r.filename).toLowerCase();
    const sideLabel = r.date
      ? formatRelativeDate(r.date)
      : (r.host === 'quotes' ? 'quotes.*' : 'proposals.*');
    return `
    <a href="${url}" target="_blank" rel="noopener" class="row" data-search="${searchKey}">
      <div class="row__ref">${r.ref}</div>
      <div>
        <div class="row__client">${r.client}</div>
        <div class="row__filename">${r.filename}</div>
      </div>
      <div class="row__type">${sideLabel}</div>
      <div class="row__action"><span class="row__open">Open ↗</span></div>
    </a>`;
  }).join('');
}

function formatRelativeDate(iso) {
  const now = new Date(), then = new Date(iso);
  if (isNaN(then.getTime())) return iso;
  const diffDays = Math.floor((now - then) / 86400000);
  if (diffDays === 0)  return 'Today';
  if (diffDays === 1)  return 'Yesterday';
  if (diffDays < 7)    return `${diffDays} days ago`;
  if (diffDays < 30)   {
    const weeks = Math.floor(diffDays / 7);
    return weeks === 1 ? '1 week ago' : `${weeks} weeks ago`;
  }
  const sameYear = then.getFullYear() === now.getFullYear();
  return then.toLocaleDateString('en-GB', sameYear ? { day: 'numeric', month: 'short' } : { month: 'short', year: 'numeric' });
}

function sortByDateDesc(records) {
  return records.sort((a, b) => {
    // Prefer explicit date, fall back to ref sort key
    if (a.date && b.date) {
      const d = new Date(b.date) - new Date(a.date);
      if (d !== 0) return d;
    }
    return refSortKey(b.ref) - refSortKey(a.ref);
  });
}

function buildUi(grouped) {
  const tabsContainer   = document.getElementById('tabs');
  const panelsContainer = document.getElementById('panels');
  tabsContainer.innerHTML   = '';
  panelsContainer.innerHTML = '';

  // Tabs always visible even when empty (signals workflow to the team).
  // Add any future "pinned" category ids here.
  const ALWAYS_VISIBLE = new Set(['renewals']);

  const visible = TAB_ORDER
    .map(id => CATEGORIES.find(c => c.id === id))
    .filter(cat => cat && (ALWAYS_VISIBLE.has(cat.id) || (grouped[cat.id] || []).length > 0));

  if (visible.length === 0) {
    panelsContainer.insertAdjacentHTML('beforeend',
      `<div class="panel"><div class="empty"><strong>No proposals yet</strong>Add entries to proposals.json and refresh.</div></div>`);
    return;
  }

  visible.forEach((cat, i) => {
    const records = sortByDateDesc(grouped[cat.id]);
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' tab--active' : '');
    tab.dataset.tab = cat.id;
    tab.innerHTML = `${cat.label} <span class="tab__count">${records.length}</span>`;
    tab.addEventListener('click', () => switchTab(cat.id));
    tabsContainer.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? '' : ' panel--hidden');
    panel.id = 'panel-' + cat.id;
    panelsContainer.appendChild(panel);
    renderPanel(panel, records);
  });

  const total = Object.values(grouped).reduce((sum, arr) => sum + arr.length, 0);
  document.getElementById('total-count').textContent = total;
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('tab--active', t.dataset.tab === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('panel--hidden', p.id !== 'panel-' + id));
}

function showError(message) {
  document.getElementById('panels').innerHTML = `
    <div class="error">
      <strong>Couldn't load proposals</strong>
      <p>${message}<br>Make sure <code>proposals.json</code> is committed at the repo root.</p>
    </div>`;
}

// Live search filter
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.row').forEach(row => {
    row.style.display = (!q || (row.dataset.search || '').includes(q)) ? '' : 'none';
  });
});

// Cloudflare Access identity (shows signed-in email in topbar if available)
async function showUser() {
  try {
    const res = await fetch('/cdn-cgi/access/get-identity', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      const email = data.email || data.user_uuid || '';
      document.getElementById('user-email').textContent = email ? `Signed in as ${email}` : '';
    }
  } catch (e) { /* not on Cloudflare Access — silently ignore */ }
}

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
(async function init() {
  showUser();
  try {
    const records = await loadProposals();
    buildUi(groupByCategory(records));
  } catch (err) {
    showError(err.message);
  }
})();
</script>
</body>
</html>
