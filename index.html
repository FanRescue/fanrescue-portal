<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Fan Rescue — Internal Proposal Portal</title>

<!-- Brand from central asset host -->
<link rel="icon" type="image/svg+xml" href="https://assets.fanrescue.co.uk/favicon/favicon.svg">
<link rel="icon" type="image/x-icon" href="https://assets.fanrescue.co.uk/favicon/favicon.ico">
<link rel="apple-touch-icon" href="https://assets.fanrescue.co.uk/favicon/apple-touch-icon.png">
<link rel="stylesheet" href="https://assets.fanrescue.co.uk/brand/tokens.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--fr-font-body);
  background: var(--fr-navy-deep);
  color: var(--fr-warm-white);
  line-height: 1.55;
  font-size: 15px;
  min-height: 100vh;
}
a { color: var(--fr-gold); text-decoration: none; }
a:hover { color: var(--fr-gold-light); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ════ TOPBAR ════ */
.topbar {
  background: var(--fr-navy-mid);
  border-bottom: 2px solid var(--fr-gold);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar__brand { display: flex; align-items: center; gap: 16px; }
.topbar__logo { height: 32px; display: block; }
.topbar__label {
  font-size: 11px;
  color: var(--fr-gold-pale);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
}
.topbar__user { font-size: 12px; color: rgba(245, 242, 236, 0.55); }

/* ════ MAIN ════ */
main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
.heading {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 32px;
  gap: 24px;
  flex-wrap: wrap;
}
.heading h1 {
  font-family: var(--fr-font-display);
  font-size: 30px;
  color: var(--fr-gold);
  letter-spacing: 0.03em;
}
.heading p {
  color: rgba(245, 242, 236, 0.6);
  font-size: 13px;
  margin-top: 6px;
}
.heading__total {
  font-size: 12px;
  color: rgba(245, 242, 236, 0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.heading__total strong {
  color: var(--fr-gold);
  font-family: var(--fr-font-display);
  font-size: 18px;
  letter-spacing: 0.02em;
  margin-left: 6px;
}

/* ════ SEARCH ════ */
.search { position: relative; margin-bottom: 24px; }
.search input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1px solid rgba(245, 242, 236, 0.15);
  border-radius: var(--fr-radius-md);
  font-family: var(--fr-font-body);
  font-size: 14px;
  background: rgba(245, 242, 236, 0.05);
  color: var(--fr-warm-white);
  transition: border-color 0.15s, background 0.15s;
}
.search input:focus {
  outline: none;
  border-color: var(--fr-gold);
  background: rgba(245, 242, 236, 0.08);
}
.search input::placeholder { color: rgba(245, 242, 236, 0.4); }
.search svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: rgba(245, 242, 236, 0.4);
}

/* ════ TABS ════ */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid rgba(245, 242, 236, 0.1);
  margin-bottom: 0;
}
.tab {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(245, 242, 236, 0.5);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--fr-warm-white); }
.tab--active {
  color: var(--fr-gold);
  border-bottom-color: var(--fr-gold);
}
.tab__count {
  display: inline-block;
  background: rgba(245, 242, 236, 0.08);
  color: rgba(245, 242, 236, 0.6);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  margin-left: 8px;
  font-weight: 700;
}
.tab--active .tab__count {
  background: var(--fr-gold);
  color: var(--fr-navy-deep);
}

/* ════ LIST ════ */
/* Rows stay light for readability. They sit as "cards" on the navy page. */
.panel {
  background: var(--fr-warm-white);
  border: 1px solid rgba(245, 242, 236, 0.1);
  border-top: none;
  border-radius: 0 0 var(--fr-radius-md) var(--fr-radius-md);
  overflow: hidden;
}
.panel--hidden { display: none; }
.row {
  display: grid;
  grid-template-columns: 90px 1fr 130px 100px;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--fr-border);
  transition: background 0.12s;
  cursor: pointer;
  gap: 16px;
}
.row:hover { background: #faf7ef; }
.row:last-child { border-bottom: none; }
.row__ref {
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 13px;
  color: var(--fr-gold);
  font-weight: 600;
}
.row__client {
  font-size: 15px;
  font-weight: 600;
  color: var(--fr-navy-deep);
}
.row__filename {
  font-size: 11px;
  color: var(--fr-warm-grey);
  font-family: ui-monospace, monospace;
  margin-top: 2px;
  word-break: break-all;
}
.row__type {
  font-size: 11px;
  color: var(--fr-warm-grey);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.row__action { text-align: right; }
.row__open {
  color: var(--fr-gold);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.15s;
}
.row:hover .row__open { opacity: 1; }

.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--fr-warm-grey);
  font-size: 14px;
}
.empty strong {
  display: block;
  font-family: var(--fr-font-display);
  font-size: 16px;
  color: var(--fr-navy-deep);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}

/* ════ LOADING ════ */
.loading { padding: 80px 24px; text-align: center; }
.loading__spinner {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 3px solid var(--fr-border);
  border-top-color: var(--fr-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading p { margin-top: 14px; font-size: 13px; color: var(--fr-warm-grey); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ════ ERROR ════ */
.error {
  background: rgba(198, 69, 69, 0.1);
  border: 1px solid rgba(198, 69, 69, 0.3);
  border-left: 4px solid #d97373;
  border-radius: var(--fr-radius-md);
  padding: 20px 24px;
  margin-top: 16px;
}
.error strong {
  display: block;
  color: #f0a8a8;
  font-family: var(--fr-font-display);
  font-size: 14px;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.error p {
  font-size: 13px;
  color: rgba(245, 242, 236, 0.7);
  margin: 0;
}
.error code {
  background: rgba(0, 0, 0, 0.3);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 12px;
  color: var(--fr-gold-pale);
}

/* ════ FOOTER ════ */
footer {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
  font-size: 11px;
  color: rgba(245, 242, 236, 0.3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@media (max-width: 700px) {
  .row { grid-template-columns: 70px 1fr auto; gap: 12px; padding: 14px 16px; }
  .row__type { display: none; }
  main { padding: 24px 12px 60px; }
  .topbar { padding: 12px 16px; }
  .heading h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar__brand">
    <img class="topbar__logo" src="https://assets.fanrescue.co.uk/logos/FR-Horizontal-Gold-Navy.svg" alt="Fan Rescue">
    <span class="topbar__label">Internal Portal</span>
  </div>
  <div class="topbar__user" id="user-email">…</div>
</div>

<main>
  <div class="heading">
    <div>
      <h1>Proposal Portal</h1>
      <p>All live proposals across cleaning, installations, and fan replacements. Pulled live from GitHub. Click any row to open in a new tab.</p>
    </div>
    <div class="heading__total">Total live <strong id="total-count">—</strong></div>
  </div>

  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="search" placeholder="Search by client name, reference, or filename…" autocomplete="off">
  </div>

  <div class="tabs" id="tabs">
    <!-- Tabs are inserted dynamically based on which categories have proposals -->
  </div>

  <div id="panels">
    <div class="panel">
      <div class="loading">
        <div class="loading__spinner"></div>
        <p>Loading proposals from GitHub…</p>
      </div>
    </div>
  </div>
</main>

<footer>
  Fan Rescue Ltd · Internal use only · Updated live from GitHub
</footer>

<script>
// ════════════════════════════════════════════════════════
// PORTAL DATA LAYER
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
// REPO SOURCES — both repos are scanned, files are then
// classified by their hero badge content, not by repo.
// ════════════════════════════════════════════════════════
const REPOS = [
  {
    owner: 'FanRescue',
    repo:  'fanrescue-proposals',
    host:  'https://proposals.fanrescue.co.uk'
  },
  {
    owner: 'FanRescue',
    repo:  'fanrescue-quotes',
    host:  'https://quotes.fanrescue.co.uk'
  }
];

// ════════════════════════════════════════════════════════
// CATEGORIES — classification rules in priority order.
// First rule whose `match` function returns true wins.
// ════════════════════════════════════════════════════════
const CATEGORIES = [
  {
    id:    'fan-replacement',
    label: 'Fan Replacement / Repair',
    short: 'Fan Replacement',
    match: badge => /fan\s*(replacement|repair)/i.test(badge)
  },
  {
    id:    'installation',
    label: 'Installations',
    short: 'Installation',
    match: badge => {
      const b = badge.toUpperCase();
      if (b.includes('INSTALLATION'))   return true;
      if (b.includes('INDICATIVE'))     return true;
      if (b.includes('VENTILATION') && b.includes('AIR CONDITIONING')) return true;
      if (b.includes('M&E') || b.includes('M & E')) return true;
      return false;
    }
  },
  {
    id:    'cleaning',
    label: 'Cleaning Proposals',
    short: 'Cleaning',
    match: badge => {
      const b = badge.toUpperCase();
      return b.includes('CLEANING') || b.includes('TR19') || b.includes('SERVICE AGREEMENT');
    }
  },
  {
    id:    'uncategorised',
    label: 'Uncategorised',
    short: 'Other',
    match: () => true     // catch-all — must be last
  }
];

function classify(badgeText) {
  for (const cat of CATEGORIES) {
    if (cat.match(badgeText || '')) return cat;
  }
  return CATEGORIES[CATEGORIES.length - 1];
}

// Match files like:  burgrill-clapton-FR-2035.html
//                    joy-king-lau-restaurant-FR-2036.html
//                    battersea-bloom-FR-2026-030.html (legacy 6-digit ref format)
const FILENAME_PATTERN = /^([a-z0-9-]+?)-(FR-\d{4}(?:-\d{3})?)\.html$/i;

// Title-case a kebab slug
function humaniseSlug(slug) {
  return slug
    .split('-')
    .map(w => w.length > 2 ? w[0].toUpperCase() + w.slice(1) : w.toUpperCase())
    .join(' ');
}

// Parse a filename into a record, or null if it doesn't match the pattern
function parseFilename(name) {
  const m = name.match(FILENAME_PATTERN);
  if (!m) return null;
  return {
    filename: name,
    slug:     m[1],
    ref:      m[2].toUpperCase(),
    client:   humaniseSlug(m[1]),
    lastModified: null   // populated below from /commits
  };
}

// Fetch the file list for a single repo and enrich each with:
//   - lastModified  (from GitHub commits API)
//   - badge         (from fetching the file's hero badge)
//   - category      (derived from badge)
async function fetchRepoFiles(cfg) {
  const headers = { 'Accept': 'application/vnd.github+json' };

  const contentsRes = await fetch(
    `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/`,
    { headers }
  );

  if (!contentsRes.ok) {
    if (contentsRes.status === 403) throw new Error(`GitHub API rate limit reached. Try again in an hour.`);
    if (contentsRes.status === 404) throw new Error(`Repository ${cfg.owner}/${cfg.repo} not found or private.`);
    throw new Error(`GitHub returned ${contentsRes.status} for /contents/`);
  }

  const items = await contentsRes.json();
  const records = items
    .filter(item => item.type === 'file' && item.name.endsWith('.html'))
    .map(item => {
      const rec = parseFilename(item.name);
      if (rec) {
        rec.host = cfg.host;
        rec.repo = cfg.repo;
        rec.url  = `${cfg.host}/${rec.filename.replace(/\.html$/, '')}`;
      }
      return rec;
    })
    .filter(rec => rec !== null);

  // Enrich each with commit date + hero badge in parallel
  await Promise.all(records.map(async (rec) => {
    // 1. Commit date — GitHub API
    try {
      const r = await fetch(
        `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/commits?path=${encodeURIComponent(rec.filename)}&per_page=1`,
        { headers }
      );
      if (r.ok) {
        const commits = await r.json();
        if (commits.length && commits[0].commit && commits[0].commit.author) {
          rec.lastModified = commits[0].commit.author.date;
        }
      }
    } catch (e) { /* row will show "—" */ }

    // 2. Hero badge — fetch from the live URL (no GitHub API call)
    try {
      const r = await fetch(rec.url + '.html', { cache: 'default' });
      if (r.ok) {
        // Read just enough to find the badge — first 8KB is plenty
        const text = (await r.text()).slice(0, 8192);
        const m = text.match(/<div\s+class="[^"]*fr-hero__badge[^"]*"[^>]*>([^<]+)<\/div>/i);
        rec.badge = m ? m[1].trim() : '';
      }
    } catch (e) { rec.badge = ''; }

    // 3. Classify
    rec.category = classify(rec.badge);
  }));

  return records;
}

// Fetch all repos in parallel and merge
async function fetchAllProposals() {
  const results = await Promise.all(
    REPOS.map(cfg => fetchRepoFiles(cfg).catch(err => ({ error: err.message, repo: cfg.repo })))
  );

  const allFiles = [];
  const errors = [];
  for (const r of results) {
    if (r.error) errors.push(r);
    else allFiles.push(...r);
  }
  return { files: allFiles, errors };
}

// Render the rows for one category into its panel
function renderPanel(panelEl, records) {
  if (records.length === 0) {
    panelEl.innerHTML = `<div class="empty"><strong>Nothing here yet</strong>Once HTML files matching this category are pushed, they'll appear here.</div>`;
    return;
  }
  panelEl.innerHTML = records.map(r => {
    const dateLabel = r.lastModified ? formatRelativeDate(r.lastModified) : '—';
    const searchKey = (r.client + ' ' + r.ref + ' ' + r.filename + ' ' + (r.badge || '')).toLowerCase();
    return `
    <a href="${r.url}" target="_blank" rel="noopener" class="row" data-search="${searchKey}">
      <div class="row__ref">${r.ref}</div>
      <div>
        <div class="row__client">${r.client}</div>
        <div class="row__filename">${r.filename}</div>
      </div>
      <div class="row__type">${dateLabel}</div>
      <div class="row__action"><span class="row__open">Open ↗</span></div>
    </a>
  `;
  }).join('');
}

// Format an ISO 8601 date as "3 days ago" / "2 weeks ago" / "15 May" / "May 2025"
function formatRelativeDate(iso) {
  const now = new Date();
  const then = new Date(iso);
  const diffMs = now - then;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7)   return diffDays === 1 ? '1 day ago' : `${diffDays} days ago`;
  if (diffDays < 30) {
    const weeks = Math.floor(diffDays / 7);
    return weeks === 1 ? '1 week ago' : `${weeks} weeks ago`;
  }

  const sameYear = then.getFullYear() === now.getFullYear();
  const opts = sameYear
    ? { day: 'numeric', month: 'short' }
    : { month: 'short', year: 'numeric' };
  return then.toLocaleDateString('en-GB', opts);
}

// Sort by commit date descending (truly newest first).
// Files without a known date fall to the bottom, sorted by ref string.
function sortByDateDesc(records) {
  return records.sort((a, b) => {
    if (a.lastModified && b.lastModified) {
      return new Date(b.lastModified) - new Date(a.lastModified);
    }
    if (a.lastModified) return -1;
    if (b.lastModified) return 1;
    return b.ref.localeCompare(a.ref);
  });
}

// ════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════

// Tab display order — different from match priority.
// Match priority puts most-specific rules first (Fan Replacement),
// but the UI shows the most-common category first (Cleaning).
const TAB_ORDER = ['cleaning', 'installation', 'fan-replacement', 'uncategorised'];

// Build the tabs + panels DOM from the categories present in the data
function buildUi(grouped, errors) {
  const tabsContainer   = document.getElementById('tabs');
  const panelsContainer = document.getElementById('panels');

  tabsContainer.innerHTML = '';
  panelsContainer.innerHTML = '';

  // Render error banner if any repo failed
  if (errors.length) {
    const banner = document.createElement('div');
    banner.className = 'error';
    banner.innerHTML = errors.map(e =>
      `<strong>Couldn't load ${e.repo}</strong><p>${e.message}<br>Repo: <code>FanRescue/${e.repo}</code></p>`
    ).join('');
    panelsContainer.appendChild(banner);
  }

  // Only render tabs for categories that actually have files, in TAB_ORDER
  const visibleCategories = TAB_ORDER
    .map(id => CATEGORIES.find(c => c.id === id))
    .filter(cat => cat && (grouped[cat.id] || []).length > 0);

  if (visibleCategories.length === 0) {
    panelsContainer.insertAdjacentHTML('beforeend',
      `<div class="panel"><div class="empty"><strong>No proposals yet</strong>Push HTML files to either repo and they'll appear here.</div></div>`
    );
    return;
  }

  visibleCategories.forEach((cat, i) => {
    const records = sortByDateDesc(grouped[cat.id]);

    // Tab
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' tab--active' : '');
    tab.dataset.tab = cat.id;
    tab.innerHTML = `${cat.label} <span class="tab__count">${records.length}</span>`;
    tab.addEventListener('click', () => switchTab(cat.id));
    tabsContainer.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? '' : ' panel--hidden');
    panel.id = 'panel-' + cat.id;
    panelsContainer.appendChild(panel);
    renderPanel(panel, records);
  });

  // Update header total
  const total = Object.values(grouped).reduce((sum, arr) => sum + arr.length, 0);
  document.getElementById('total-count').textContent = total;
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('tab--active', t.dataset.tab === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('panel--hidden', p.id !== 'panel-' + id));
}

// Live search filter (across whichever panel is currently visible — and others too)
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.row').forEach(row => {
    const haystack = row.dataset.search || '';
    row.style.display = (!q || haystack.includes(q)) ? '' : 'none';
  });
});

// Try to surface the logged-in Cloudflare Access user
async function showUser() {
  try {
    const res = await fetch('/cdn-cgi/access/get-identity', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      const email = data.email || data.user_uuid || '';
      document.getElementById('user-email').textContent = email ? `Signed in as ${email}` : '';
    }
  } catch (e) { /* not on Cloudflare Access — silently ignore */ }
}

// Group records by category id
function groupByCategory(records) {
  const out = {};
  CATEGORIES.forEach(c => out[c.id] = []);
  records.forEach(r => {
    const id = r.category ? r.category.id : 'uncategorised';
    (out[id] = out[id] || []).push(r);
  });
  return out;
}

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════

(async function init() {
  showUser();

  const { files, errors } = await fetchAllProposals();
  const grouped = groupByCategory(files);
  buildUi(grouped, errors);
})();
</script>
</body>
</html>
